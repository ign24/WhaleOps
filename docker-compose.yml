services:
  agent:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/1}
      - MILVUS_URI=${MILVUS_URI:-http://milvus-standalone:19530}
      - TRACES_PATH=${TRACES_PATH:-/app/traces/agent_traces.jsonl}
      - LOGS_PATH=${LOGS_PATH:-/app/logs/agent.log}
      - NOTES_DB_PATH=${NOTES_DB_PATH:-/app/data/ops_notes.db}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./traces:/app/traces
      - ./logs:/app/logs
      - ops_data:/app/data
    depends_on:
      - redis
      - milvus-standalone
    restart: unless-stopped

  mcp-server:
    build: .
    command: uv run mcp-server --transport streamable-http --port 3100
    environment:
      - MCP_AGENT_URL=http://agent:8000
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=3100
    ports:
      - "3100:3100"
    depends_on:
      - agent
    restart: unless-stopped

  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    command:
      - /usr/local/bin/etcd
      - --data-dir=/etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
    volumes:
      - etcd_data:/etcd
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    command: minio server /minio_data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/minio_data
    restart: unless-stopped

  milvus-standalone:
    image: milvusdb/milvus:v2.5.5
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    restart: unless-stopped

volumes:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:
  ops_data:
