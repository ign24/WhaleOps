      - pr review
      - pull request
      - lint
      - complexity
      - code smell
      - diff
      - quick review
      - quick analysis

  - id: senior-qa
    enabled: true
    category: reliability
    priority: 30
    file: src/cognitive_code_agent/prompts/skills/senior-qa.md
    required_tools:
      - run_pytest
      - run_jest
      - analyze_test_coverage
