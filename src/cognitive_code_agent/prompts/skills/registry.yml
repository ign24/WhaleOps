version: 1
default_max_active_skills: 2
default_max_skill_chars: 8000
total_skill_budget_chars: 16000
priority_order:
  - security
  - correctness
  - reliability
  - docs
  - style

skills:
  - id: tdd
    enabled: true
    category: correctness
    priority: 12
    file: src/cognitive_code_agent/prompts/skills/tdd.md
    required_tools:
      - run_pytest
    triggers:
      - implement
      - feature
      - new function
      - fix bug
      - write code
      - add
      - create
      - build
      - implementar
      - crear
      - construir
      - agregar

  - id: refactoring
    enabled: true
    category: correctness
    priority: 15
    file: src/cognitive_code_agent/prompts/skills/refactoring.md
    required_tools:
      - refactor_gen
      - write_file
      - edit_file
      - run_ruff
      - run_eslint
    triggers:
      - refactor
      - refactoring
      - refactorizar
      - rewrite
      - restructure
      - reestructurar
      - reorganize
      - reorganizar
      - clean up
      - limpiar codigo

  - id: security-review
    enabled: true
    category: security
    priority: 10
    file: src/cognitive_code_agent/prompts/skills/security-review.md
