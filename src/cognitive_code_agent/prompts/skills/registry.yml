  - id: debugger
    enabled: true
    category: reliability
    priority: 50
    file: src/cognitive_code_agent/prompts/skills/debugger.md
    required_tools:
      - shell_execute
    triggers:
      - debug
      - bug
      - error
      - crash
      - stack trace
      - not working

  - id: api-design
    enabled: true
    category: correctness
    priority: 25
    file: src/cognitive_code_agent/prompts/skills/api-design.md
