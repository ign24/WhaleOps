      - owasp
      - hardening
      - audit

  - id: code-reviewer
    enabled: true
    category: correctness
    priority: 20
    file: src/cognitive_code_agent/prompts/skills/code-reviewer.md
    required_tools:
      - get_diff
      - run_ruff
      - run_eslint
      - analyze_complexity
