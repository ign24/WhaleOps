general:
  enable_per_user_monitoring: true
  telemetry:
    tracing:
      file_tracer:
        _type: file
        output_path: $TRACES_PATH
        project: cognitive-ops-agent
        mode: append
        enable_rolling: true
        max_file_size: 10485760
        max_files: 5
    logging:
      console:
        _type: console
        level: INFO
      file_log:
        _type: file
        path: $LOGS_PATH
        level: DEBUG
  front_end:
    _type: fastapi
    host: 0.0.0.0
    port: 8000
    cors:
      allow_origins:
        - "http://localhost:3000"
        - "http://localhost:3001"
      allow_methods:
        - "*"
      allow_headers:
        - "*"

llms:
  devstral:
    _type: nim
    model_name: mistralai/devstral-2-123b-instruct-2512
    temperature: 0.1
    top_p: 0.9
    max_tokens: 32768
    api_key: $NVIDIA_API_KEY

embedders:
  nim_embedder:
    _type: nim
    model_name: nvidia/llama-nemotron-embed-1b-v2
    truncate: END
    api_key: $NVIDIA_API_KEY

functions:
  list_containers:
    _type: list_containers
    description: >
      List Docker containers on this host. Set all_containers=true to include
      stopped/exited containers (default: running only).

  get_container_logs:
    _type: get_container_logs
    description: >
      Retrieve recent log output (with timestamps) for a Docker container.
      Specify container name or ID and optionally the number of lines (default 50, max 500).

  inspect_container:
    _type: inspect_container
    description: >
      Inspect a Docker container: status, image, exit code, restart count, restart policy.

  schedule_task:
    _type: schedule_task
    description: |
      Manage recurring scheduled agent tasks.
      Use action='create' with a 5-field cron expression (e.g. '0 9 * * 1' for every Monday at 9am)
      and a prompt (the message the agent will receive when the job fires).
      Use action='list' to see all active schedules.
      Use action='cancel' with job_id to remove a schedule.
      Schedules persist across server restarts.

  save_note:
    _type: save_note
    description: >
      Persist a structured note to the ops SQLite memory store.
      Types: daily_summary, instruction, pattern, anomaly.
      Optionally scope to a container_name.

  get_notes:
    _type: get_notes
    description: >
      Retrieve recent notes from the ops SQLite memory store.
      Filter by container_name and/or note_type. Returns most recent first.


workflow:
  _type: tool_calling_agent
  llm_name: devstral
  max_history: 8
  max_iterations: 20
  tool_call_timeout_seconds: 30
  handle_tool_errors: true
  verbose: true
  prompt_base_path: src/cognitive_code_agent/prompts/system/base.md
  skill_registry_path: src/cognitive_code_agent/prompts/skills/registry.yml
  max_active_skills: 2
  tool_loop_guard_threshold: 2
  max_parallel_tool_calls: 3
  tool_names:
    - list_containers
    - get_container_logs
    - inspect_container
    - schedule_task
    - save_note
    - get_notes

  default_mode: ops
  modes:
    ops:
      llm_name: devstral
      max_recovery_rounds: 2
      prompt_path: src/cognitive_code_agent/prompts/system/ops.md
      max_iterations: 20
      max_history: 8
      tool_call_timeout_seconds: 30
      tool_loop_guard_threshold: 2
      max_parallel_tool_calls: 3
      max_tool_calls_per_request:
        list_containers: 3
        get_container_logs: 5
        inspect_container: 5
        save_note: 10
        get_notes: 3
      tool_names:
        - list_containers
        - get_container_logs
        - inspect_container
        - schedule_task
        - save_note
        - get_notes

    chat:
      llm_name: devstral
      max_recovery_rounds: 1
      prompt_path: src/cognitive_code_agent/prompts/system/chat.md
      max_iterations: 3
      max_history: 4
      tool_call_timeout_seconds: 30
      tool_loop_guard_threshold: 2
      max_parallel_tool_calls: 3
      max_tool_calls_per_request:
        get_notes: 2
      tool_names:
        - get_notes
