llms:
  specialist_llm:
    _type: nim
    model_name: nvidia/llama-3.3-nemotron-super-49b-v1.5
    temperature: 0.1
    top_p: 0.85
    max_tokens: 4096
    api_key: $NVIDIA_API_KEY

eval:
  general:
    output_dir: .tmp/eval_output/
    dataset:
      _type: json
      file_path: data/eval_judge_test.json
  evaluators:
    agent_judge:
      _type: agent_judge
      llm_name: specialist_llm
