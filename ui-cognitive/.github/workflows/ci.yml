name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Unit tests with coverage
        run: bun run test:coverage

      - name: Build
        env:
          AUTH_SECRET: ci-secret
          NAT_BACKEND_URL: http://127.0.0.1:8000
        run: bun run build

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps

      - name: Seed E2E admin user
        env:
          E2E_EMAIL: e2e-admin@cgn.local
          E2E_PASSWORD: e2e-password-123
          E2E_NAME: E2E Admin
        run: node scripts/seed-e2e-user.mjs

      - name: Run E2E tests
        env:
          AUTH_SECRET: ci-secret
          NAT_BACKEND_URL: http://127.0.0.1:8000
          E2E_EMAIL: e2e-admin@cgn.local
          E2E_PASSWORD: e2e-password-123
          E2E_ADMIN_EMAIL: e2e-admin@cgn.local
          E2E_ADMIN_PASSWORD: e2e-password-123
        run: bun run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
